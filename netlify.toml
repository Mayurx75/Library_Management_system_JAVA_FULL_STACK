# Netlify only auto-loads netlify.toml from the REPOSITORY ROOT.
# A copy under library-frontend/ is ignored for Git-based sites unless the UI
# "Base directory" is set to that folder (and then root rules still win).
# This file pins the monorepo app so builds always run in library-frontend/.

[build]
  base = "library-frontend"
  command = "npm install --prefix netlify/functions --no-audit --no-fund && npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
  external_node_modules = ["express"]

[build.environment]
  NODE_VERSION = "20"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
