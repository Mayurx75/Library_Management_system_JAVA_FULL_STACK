# Netlify Functions (Express) serve /api on production. BACKEND_URL overrides to external Spring API.
[build]
  command = "npm install --prefix netlify/functions --no-audit --no-fund && npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
  external_node_modules = ["express"]

[build.environment]
  NODE_VERSION = "20"

# Avoid stale SPA shells: old index.html kept pointing at old hashed JS that still contained the site footer.
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
